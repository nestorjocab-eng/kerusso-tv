<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kerusso TV - En Vivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #0A1628; color: white; margin: 0; }
        .container { max-width: 900px; margin: auto; padding: 20px; }
        .btn { background: #D4AF37; color: #0A1628; padding: 12px 24px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .btn:hover { opacity: 0.9; }
        video { width: 100%; border-radius: 15px; margin-top: 20px; }
        h1 { font-family: 'Cormorant Garamond', serif; text-align: center; font-size: 2.5rem; margin-bottom: 20px; }
        p { text-align: center; color: #ccc; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Kerusso TV - Transmisión en Vivo</h1>
        <p>Disfruta de nuestra programación 24/7 de mensajes de fe, alabanza y palabra viva.</p>

        <button class="btn" onclick="playLive()">Ver En Vivo <i class="fas fa-play ml-2"></i></button>

        <video id="liveVideo" controls autoplay style="display:none;">
            <source src="https://s.emisoras.tv:8081/kerussotv/index.m3u8" type="application/x-mpegURL">
            Tu navegador no soporta este video.
        </video>
    </div>

    <script>
        function playLive() {
            const video = document.getElementById('liveVideo');
            video.style.display = 'block';
            video.play();
            window.scrollTo({ top: video.offsetTop, behavior: 'smooth' });
        }
    </script>
</body>
</html>
